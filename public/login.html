<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desiree | Entry Protocol</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-wrap {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .login-card {
            background: var(--bg-glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border-subtle);
            border-radius: 32px;
            padding: 3.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            animation: cardEnter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes cardEnter {
            from { opacity: 0; transform: scale(0.9) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .login-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        .login-header p {
            color: var(--text-low);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="mesh-background"></div>
    
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-header">
                <h1>Talent Nexus</h1>
                <p>Initialize identity protocol</p>
            </div>
            
            <form id="loginForm">
                <div class="input-group" style="margin-bottom: 1.5rem;">
                    <label>Username</label>
                    <input type="text" id="username" name="username" required placeholder="System identity">
                </div>
                <div class="input-group" style="margin-bottom: 2rem;">
                    <label>Password</label>
                    <input type="password" id="password" name="password" required placeholder="Protocol key">
                </div>
                
                <button type="submit" id="loginBtn" class="btn-primary" style="width: 100%; justify-content: center; height: 3.5rem; font-size: 1rem;">
                    <span class="btn-text">Authenticate</span>
                    <div class="loader hidden"></div>
                </button>
            </form>
            
            <div id="loginError" style="margin-top: 1.5rem; color: #f43f5e; font-size: 0.85rem; text-align: center;" class="hidden">
                Invalid credentials. Access denied.
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loader = loginBtn.querySelector('.loader');
        const btnText = loginBtn.querySelector('.btn-text');
        const loginError = document.getElementById('loginError');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loader.classList.remove('hidden');
            btnText.style.opacity = '0.5';
            loginError.classList.add('hidden');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    window.location.href = '/index.html';
                } else {
                    loginError.classList.remove('hidden');
                }
            } catch (err) {
                loginError.textContent = 'Nexus connection error.';
                loginError.classList.remove('hidden');
            } finally {
                loginBtn.disabled = false;
                loader.classList.add('hidden');
                btnText.style.opacity = '1';
            }
        });
    </script>
</body>
</html>
